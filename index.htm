<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- meta data -->
    <meta name="author" content="MD. JAHIDUL ISLAM SUJAN">
    <meta name="copyright" content="Jahid Sir">
    <meta name="description" content="ICT Flow by Jahid Sir : Student Admission Form.">
    <!-- auto refresh -->
    <meta http-equiv="refresh" content="900">
    <!-- html title -->
    <title>ICT by Jahid Sir :: Admission Form</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/ICT.png" type="image/x-icon">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="assets/css/bootstrap-grid.css">
    <!-- pageclip css -->
    <link rel="stylesheet" href="assets/css/pageclip.co.css" media="screen">
    <!-- font awesome kit -->
    <script src="assets/js/font-awesome-kit.js"></script>
</head>

<body>

    <header>

        <h1>ICT Flow <span>by</span> Jahid Sir</h1>

    </header>

    <main>

        <section class="themed-grid-col row">
            <div class="col-12 themed-grid-col">
                <h2>Batches</h2>
            </div>
            <div class="col-md-4 themed-grid-col">
                <h3>HSC 1st year</h3>
            </div>
            <div class="col-md-4 themed-grid-col">
                <h3>HSC 2nd year</h3>
            </div>
            <div class="col-md-4 themed-grid-col">
                <h3>Admission Test</h3>
            </div>
        </section>

        <section class="themed-grid-col row">
            <div class="col-12 themed-grid-col">
                <h2>Locations</h2>
            </div>
            <div class="col-md-6 themed-grid-col row">
                <div class="col-1 themed-grid-col">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <h3>K-Block, Halishahar.</h3>
                </div>
            </div>
            <div class="col-md-6 themed-grid-col row">
                <div class="col-1 themed-grid-col">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <h3>Mogoltuli, Agrabad.</h3>
                </div>
            </div>
        </section>

        <section class="themed-grid-col row">
            <div class="col-12 themed-grid-col">
                <h2>Contact Jahid Sir</h2>
            </div>
            <div class="col-md-6 themed-grid-col row" title="Phone">
                <div class="col-1 themed-grid-col">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <a href="tel:01956185620" target="_blank">019 5618 5620</a>
                </div>
            </div>
            <div class="col-md-6 themed-grid-col row" title="WhatsApp">
                <div class="col-1 themed-grid-col">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <a href="https://wa.me/+8801956185620" target="_blank">019 5618 5620</a>
                </div>
            </div>
            <div class="col-md-6 themed-grid-col row" title="Facebook">
                <div class="col-1 themed-grid-col">
                    <i class="fa-brands fa-facebook"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <a href="https://www.facebook.com/ictflowbd" target="_blank">ICT Flow by Jahid Sir</a>
                </div>
            </div>
            <div class="col-md-6 themed-grid-col row" title="Telegram">
                <div class="col-1 themed-grid-col">
                    <i class="fa-brands fa-telegram"></i>
                </div>
                <div class="col-10 themed-grid-col">
                    <a href="https://t.me/ictflowbd" target="_blank">ICT Flow by Jahid Sir</a>
                </div>
            </div>
        </section>

        <hr>

        <section class="themed-grid-col">
            <form action="https://send.pageclip.co/YUuwE87lZcj7VY8wzdAT1x3F1fVy4NXF/student-info" class="pageclip-form row" method="post">
                <div class="col-12 themed-grid-col">
                    <h2>Get Your Admission</h2>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="name">Student Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Name" maxlength="40" placeholder="Full Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="father name">Father Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Father Name" maxlength="40" placeholder="Father Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="mother name">Mother Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Mother Name" maxlength="40" placeholder="Mother Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="college name">College Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="College Name" maxlength="50" placeholder="College Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="batch">Batch</label>
                </div>
                <div class="col-md-8 themed-grid-col row">
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Batch" id="admission" value="Admission" required>
                        <label class="radio-option" for="admission">Admission</label>
                    </span>
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Batch" id="2024" value="HSC-2024">
                        <label class="radio-option" for="2024">HSC 2024</label>
                    </span>
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Batch" id="2025" value="HSC-2025">
                        <label class="radio-option" for="2025">HSC 2025</label>
                    </span>
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Batch" id="2026" value="HSC-2026">
                        <label class="radio-option" for="2026">HSC 2026</label>
                    </span>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="group">Group</label>
                </div>
                <div class="col-md-8 themed-grid-col row">
                    <span class="col-md-12 themed-grid-col">
                        <input type="radio" name="Group" id="science" value="Science" required>
                        <label class="radio-option" for="science">Science</label>
                    </span>
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Group" id="commerce" value="Commerce">
                        <label class="radio-option" for="commerce">Commerce</label>
                    </span>
                    <span class="col-md-6 themed-grid-col">
                        <input type="radio" name="Group" id="humanities" value="Humanities">
                        <label class="radio-option" for="humanities">Humanities</label>
                    </span>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="date of birth">Date of Birth</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="date" name="Date of Birth" min="2005-01-01" max="2009-12-31" placeholder="mm/dd/yyyy" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="phone number">Phone Number</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="tel" name="Phone Number" pattern="01[0-9]{9}" placeholder="01987654321" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="guardian phone">Guardian Number</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="tel" name="Guardian Phone" pattern="01[0-9]{9}" placeholder="01987654321" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="school">School Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="School Name" maxlength="50" placeholder="School Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="ssc result">SSC Result</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="number" name="SSC Result" min="1" max="5" step="any" placeholder="SSC GPA" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="email">Email</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="email" name="Email" maxlength="30" placeholder="youremail@gmail.com">
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="address">Home Address</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Address" maxlength="256" placeholder="Full Address" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label for="location">Location</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="radio" name="Location" id="k_block" value="K-Block">
                    <label class="radio-option" for="k_block">K-Block, Halishahar</label>
                    <br>
                    <input type="radio" name="Location" id="agrabad" value="Mogoltuli" required>
                    <label class="radio-option" for="agrabad">Mogoltuli, Agrabad</label>
                    <br>
                    <input type="radio" name="Location" id="others" value="Others">
                    <label class="radio-option" for="others">Others</label>
                </div>
                <div class="col-md-12 themed-grid-col">
                    <button type="submit" class="pageclip-form__submit">
                        <span>SUBMIT</span>
                    </button>
                </div>
            </form>
        </section>

    </main>

    <footer>

        <p>
            &copy; 2024 - ICT Flow by Jahid Sir
        </p>

    </footer>

    <!-- pageclip javascript -->
    <script src="assets/js/pageclip.co.js" charset="utf-8"></script>

</body>

</html>
