<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="copyright" content="Jahid Sir">
    <meta name="description" content="ICT Flow by Jahid Sir : Student Admission Form.">
    <!-- auto refresh -->
    <meta http-equiv="refresh" content="900">
    <!-- html title -->
    <title>ICT by Jahid Sir :: Admission Form</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/ICT.png" type="image/x-icon">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="assets/css/bootstrap-grid.css">
    <!-- pageclip css -->
    <link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">

    <script src="https://kit.fontawesome.com/7d900594b9.js" crossorigin="anonymous"></script>
</head>

<body>

    <header>
    </header>

    <main>

        <div class="row text-center">
            <div class="col-lg-5 themed-grid-col details">
                <div class="align-items-center row">
                    <h1 class="name">ICT by Jahid Sir</h1>
                    <div class="row">
                        <div class="col-md-7 col-lg-12 themed-grid-col location">
                            <h3 class="data">HSC 1st & 2nd year</h3>
                            <p class="data">Regular & special batch</p>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <h3>ABACUS</h3>
                                    <p>Mogoltuli circle, Agrabad.</p>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <h3>Pi-Rates</h3>
                                    <p>Gate 7, K-Block, Halishahar.</p>
                                </div>
                            </div>

                        </div>
                        <div class="col-md-5 col-lg-12 themed-grid-col contact">
                            <h3 class="sir">Contact Jahid Sir</h3>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-phone"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="tel:01956185620" target="_blank" rel="noopener noreferrer">01956185620</a>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-whatsapp"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://wa.me/+8801956185620" target="_blank" rel="noopener noreferrer">01956185620</a>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-facebook"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://www.facebook.com/ict.jahid.sir" target="_blank" rel="noopener noreferrer">Jahid Sir</a>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-facebook"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://www.facebook.com/ictflowbd" target="_blank" rel="noopener noreferrer">ICT Flow</a>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-telegram"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://t.me/ictflowbd" target="_blank" rel="noopener noreferrer">ICT Flow</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 themed-grid-col">
                <form action="https://send.pageclip.co/YUuwE87lZcj7VY8wzdAT1x3F1fVy4NXF/student-info" class="pageclip-form row" method="post">
                    <div class="col-md-5 themed-grid-col">
                        <label for="name">Student Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="name" id="name" maxlength="30" placeholder="Your Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="f_name">Father Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="f_name" id="f_name" maxlength="30" placeholder="Father Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="m_name">Mother Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="m_name" id="m_name" maxlength="30" placeholder="Mother Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="c_name">College Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="c_name" id="c_name" maxlength="40" placeholder="College Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="dob">Date of Birth</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="date" min="2004-01-01" max="2008-12-31" name="dob" id="dob" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="phone">Phone Number</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="tel" name="phone" id="phone" placeholder="01987654321" pattern="01[0-9]{9}" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="g_phone">Guardian Number</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="tel" name="g_phone" id="g_phone" placeholder="01987654321" pattern="01[0-9]{9}">
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="email" name="email" id="email" maxlength="30" placeholder="youremail@gmail.com">
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="address">Home Address</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="address" id="address" rows="3" placeholder="Full Address" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="season">Season</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="radio" name="season" id="2023" value="2023" required>
                        <label class="radio-option" for="2023">2021-2022 (HSC 2023)</label>
                        <br>
                        <input type="radio" name="season" id="2024" value="2024">
                        <label class="radio-option" for="2024">2022-2023 (HSC 2024)</label>
                        <br>
                        <input type="radio" name="season" id="2025" value="2025">
                        <label class="radio-option" for="2025">2023-2024 (HSC 2025)</label>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="location">Location</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="radio" name="location" id="agrabad" value="agrabad" required>
                        <label class="radio-option" for="agrabad">ABACUS, Agrabad</label>
                        <br>
                        <input type="radio" name="location" id="k_block" value="k_block">
                        <label class="radio-option" for="k_block">Pi-Rates, K-Block</label>
                        <br>
                        <input type="radio" name="location" id="others" value="others">
                        <label class="radio-option" for="others">Others</label>
                    </div>
                    <div class="col-md-12 themed-grid-col">
                        <button type="submit" class="pageclip-form__submit">
                            <span>Send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <footer>

        <div class="row text-center">
            <div class="col-lg-6 themed-grid-col">
                <p class="copyright">
                    &copy; <span id="year-call"></span> - Jahid Sir - ICT Flow
                </p>
            </div>
            <div class="col-lg-6 themed-grid-col">
                <p class="clock">
                    <span id="clock-call"></span>
                </p>
            </div>
        </div>

    </footer>

</html>
