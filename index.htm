<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- meta data -->
    <meta name="author" content="MD. JAHIDUL ISLAM SUJAN">
    <meta name="copyright" content="Jahid Sir">
    <meta name="description" content="ICT Flow by Jahid Sir : Student Admission Form.">
    <!-- auto refresh -->
    <meta http-equiv="refresh" content="900">
    <!-- html title -->
    <title>ICT by Jahid Sir :: Admission Form</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/ICT.png" type="image/x-icon">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- bootstrap css -->
    <!-- <link rel="stylesheet" href="assets/css/headers.css"> -->
    <link rel="stylesheet" href="assets/css/bootstrap-grid.css">
    <!-- pageclip css -->
    <link rel="stylesheet" href="assets/css/pageclip.co.css" media="screen">
    <!-- font awesome kit -->
    <script src="assets/js/font-awesome-kit.js"></script>
</head>

<body>

    <header class="d-flex flex-wrap justify-content-center">
        <img src="assets/img/ICT.jpg" alt="ICT" class="ict d-flex align-items-center me-md-auto link-body-emphasis text-decoration-none">
  
        <h1 class="name nav nav-pills">ICT <span>by</span> Jahid Sir</h1>
      </header>

    <main>

        <div class="row text-center">
            <div class="col-lg-5 themed-grid-col details">
                <div class="align-items-center row">
                    <div class="row">
                        <div class="col-md-7 col-lg-12 themed-grid-col location">
                            <h3 class="data">HSC 1st & 2nd year</h3>
                            <p class="data">Regular & special batch</p>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <h3>ABACUS</h3>
                                    <p>Mogoltuli circle, Agrabad.</p>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <h3>Pi-Rates</h3>
                                    <p>Gate 7, K-Block, Halishahar.</p>
                                </div>
                            </div>

                        </div>
                        <div class="col-md-5 col-lg-12 themed-grid-col contact">
                            <h3 class="sir">Contact Jahid Sir</h3>
                            <div class="row" title="Phone">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-solid fa-phone"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="tel:01956185620" target="_blank" rel="noopener noreferrer">01956185620</a>
                                </div>
                            </div>
                            <div class="row" title="WhatsApp">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-whatsapp"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://wa.me/+8801956185620" target="_blank" rel="noopener noreferrer">01956185620</a>
                                </div>
                            </div>
                            <div class="row" title="Facebook Profile">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-facebook"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://www.facebook.com/ict.jahid.sir" target="_blank" rel="noopener noreferrer">Jahid Sir</a>
                                </div>
                            </div>
                            <div class="row" title="Facebook Page">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-facebook"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://www.facebook.com/ictflowbd" target="_blank" rel="noopener noreferrer">ICT Flow</a>
                                </div>
                            </div>
                            <div class="row" title="Telegram">
                                <div class="col-1 themed-grid-col">
                                    <i class="fa-brands fa-telegram"></i>
                                </div>
                                <div class="col-11 themed-grid-col">
                                    <a href="https://t.me/ictflowbd" target="_blank" rel="noopener noreferrer">ICT Flow</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 themed-grid-col">
                <form action="https://send.pageclip.co/YUuwE87lZcj7VY8wzdAT1x3F1fVy4NXF/student-info" class="pageclip-form row" method="post">
                    <div class="col-md-5 themed-grid-col">
                        <label for="name">Student Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="name" maxlength="30" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="father name">Father Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="father name" maxlength="30" placeholder="Father Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="mother name">Mother Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="mother name" maxlength="30" placeholder="Mother Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="college name">College Name</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="college name" maxlength="40" placeholder="College Name" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="date of birth">Date of Birth</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="date" name="date of birth" min="2004-01-01" max="2008-12-31" placeholder="mm/dd/yyyy" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="phone number">Phone Number</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="tel" name="phone number" pattern="01[0-9]{9}" placeholder="01987654321" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="guardian phone">Guardian Number</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="tel" name="guardian phone" pattern="01[0-9]{9}" placeholder="01987654321">
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="email">Email Address</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="email" name="email"  maxlength="30" placeholder="youremail@gmail.com">
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="address">Home Address</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="text" name="address" maxlength="100" placeholder="Full Address" required>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="season">Season</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="radio" name="season" id="2023" value="2021-22 HSC-2023" required>
                        <label class="radio-option" for="2023">2021-2022 (HSC 2023)</label>
                        <br>
                        <input type="radio" name="season" id="2024" value="2022-23 HSC-2024">
                        <label class="radio-option" for="2024">2022-2023 (HSC 2024)</label>
                        <br>
                        <input type="radio" name="season" id="2025" value="2023-24 HSC-2025">
                        <label class="radio-option" for="2025">2023-2024 (HSC 2025)</label>
                    </div>
                    <div class="col-md-5 themed-grid-col">
                        <label for="location">Location</label>
                    </div>
                    <div class="col-md-7 themed-grid-col">
                        <input type="radio" name="location" id="agrabad" value="ABACUS" required>
                        <label class="radio-option" for="agrabad">ABACUS, Agrabad</label>
                        <br>
                        <input type="radio" name="location" id="k_block" value="Pi-Rates">
                        <label class="radio-option" for="k_block">Pi-Rates, K-Block</label>
                        <br>
                        <input type="radio" name="location" id="others" value="Others">
                        <label class="radio-option" for="others">Others</label>
                    </div>
                    <div class="col-md-12 themed-grid-col">
                        <button type="submit" class="pageclip-form__submit">
                            <span>SUBMIT</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <footer>

        <div class="row text-center">
            <div class="col-lg-6 themed-grid-col">
                <p class="copyright">
                    &copy; <span id="year-call"></span> - Jahid Sir - ICT Flow
                </p>
            </div>
            <div class="col-lg-6 themed-grid-col">
                <p class="clock">
                    <span id="clock-call"></span>
                </p>
            </div>
        </div>

    </footer>

    <!-- pageclip javascript -->
    <script src="assets/js/pageclip.co.js" charset="utf-8"></script>
    <!-- custom javascript -->
    <script src="assets/js/app.js"></script>

</body>

</html>
