<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- meta data -->
    <meta name="author" content="MD. JAHIDUL ISLAM SUJAN">
    <meta name="copyright" content="MD. JAHIDUL ISLAM SUJAN">
    <meta name="description" content="ICT Flow by Jahid : Student Admission Form.">
    <!-- auto refresh -->
    <meta http-equiv="refresh" content="900">
    <!-- html title -->
    <title>ICT Flow by Jahid :: Admission Form</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="assets/img/ICT-Flow-logo.png" type="image/x-icon">
    <!-- custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="assets/css/bootstrap-grid.css">
    <!-- particles css -->
    <link rel="stylesheet" href="assets/css/particles.css">

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <!-- Google tag (gtag.js) --- done -->

</head>

<body>

    <!-- particles -->
    <div id="particles-js"></div>
    <!-- particles -->

    <main>

        <h1> ICT Flow <span>by</span> Jahid </h1>

        <section class="themed-grid-col">
            <form id="admissionForm" class="row" method="post">

                <div class="col-md-4 themed-grid-col">
                    <label>Student Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Name" maxlength="40" placeholder="Full Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Father Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="FatherName" maxlength="40" placeholder="Father Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Mother Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="MotherName" maxlength="40" placeholder="Mother Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>College Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="CollegeName" maxlength="50" placeholder="College Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Batch</label>
                </div>
                <div class="col-md-8 themed-grid-col row">
                    <span class="col-sm-6 themed-grid-col">
                        <input type="radio" name="Batch" id="2026" value="HSC 2026" required>
                        <label for="2026">HSC 2026</label>
                    </span>
                    <span class="col-sm-6 themed-grid-col">
                        <input type="radio" name="Batch" id="2025" value="HSC 2025">
                        <label for="2025">HSC 2025</label>
                    </span>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Group</label>
                </div>
                <div class="col-md-8 themed-grid-col row">
                    <span class="col-sm-12 themed-grid-col">
                        <input type="radio" name="Group" id="science" value="Science" required>
                        <label for="science">Science</label>
                    </span>
                    <span class="col-sm-6 themed-grid-col">
                        <input type="radio" name="Group" id="commerce" value="Commerce">
                        <label for="commerce">Commerce</label>
                    </span>
                    <span class="col-sm-6 themed-grid-col">
                        <input type="radio" name="Group" id="humanities" value="Humanities">
                        <label for="humanities">Humanities</label>
                    </span>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Date of Birth</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="date" name="DateOfBirth" min="2006-01-01" max="2010-12-31" placeholder="mm/dd/yyyy" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Phone Number</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="tel" name="PhoneNumber" pattern="01[0-9]{9}" placeholder="01*********" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Guardian Number</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="tel" name="GuardianPhone" pattern="01[0-9]{9}" placeholder="01*********" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>School Name</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="SchoolName" maxlength="50" placeholder="School Name" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>SSC Result</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="number" name="SSCresult" min="1" max="5" step="any" placeholder="SSC GPA" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Email</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="email" name="Email" maxlength="30" placeholder="youremail@gmail.com">
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Home Address</label>
                </div>
                <div class="col-md-8 themed-grid-col">
                    <input type="text" name="Address" maxlength="256" placeholder="Full Address" required>
                </div>
                <div class="col-md-4 themed-grid-col">
                    <label>Location</label>
                </div>
                <div class="col-md-8 themed-grid-col row">
                    <span class="col-sm-12 themed-grid-col">
                        <input type="radio" name="Location" id="k_block" value="K-Block">
                        <label for="k_block">K-Block, Halishahar</label>
                    </span>
                    <span class="col-sm-12 themed-grid-col">
                        <input type="radio" name="Location" id="agrabad" value="Mogoltuli" required>
                        <label for="agrabad">Mogoltuli, Agrabad</label>
                    </span>
                    <span class="col-sm-12 themed-grid-col">
                        <input type="radio" name="Location" id="others" value="Others">
                        <label for="others">Others</label>
                    </span>
                </div>
                <div class="col-md-12 themed-grid-col">
                    <button name="btn" type="submit"> SUBMIT </button>
                    <p id="res"></p>
                </div>

            </form>
        </section>

        <p id="copyright"></p>

    </main>

    <!-- particles -->
    <script src="assets/js/particles.min.js"></script>
    <script src="assets/js/particles.js"></script>
    <!-- custom javascript -->
    <script src="assets/js/script.js"></script>

</body>

</html>
